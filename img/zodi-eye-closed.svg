<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 84" role="img" aria-label="The Zodi third eye, closed in rest">
  <defs>
    <linearGradient id="zec-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe2b4"/>
      <stop offset="100%" stop-color="#b99c5e"/>
    </linearGradient>
    <filter id="zec-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rays of the third eye, brass -->
  <g stroke="url(#zec-lid)" stroke-width="1.6" stroke-linecap="round" opacity=".85">
    <line x1="60" y1="10" x2="60" y2="2"/>
    <line x1="41" y1="14" x2="37" y2="7"/>
    <line x1="79" y1="14" x2="83" y2="7"/>
    <line x1="25" y1="24" x2="18" y2="19"/>
    <line x1="95" y1="24" x2="102" y2="19"/>
  </g>

  <!-- the almond, resting shut: filled, no waking iris -->
  <path d="M8 48 C28 20, 92 20, 112 48 C92 74, 28 74, 8 48 Z"
        fill="oklch(0.16 0.03 275)" stroke="url(#zec-lid)" stroke-width="2.4" filter="url(#zec-glow)"/>

  <!-- upper lid crease, a soft fold -->
  <path d="M30 44 C46 38.5, 74 38.5, 90 44" fill="none"
        stroke="url(#zec-lid)" stroke-width="1.3" stroke-linecap="round" opacity=".3"/>

  <!-- the closed eyelid: one graceful, gently downcast arc -->
  <path d="M14 50 C36 40.5, 84 40.5, 106 50" fill="none"
        stroke="url(#zec-lid)" stroke-width="2.8" stroke-linecap="round" filter="url(#zec-glow)"/>

  <!-- downcast lashes, quiet -->
  <g stroke="url(#zec-lid)" stroke-width="1.3" stroke-linecap="round" opacity=".6">
    <line x1="37" y1="50.4" x2="34" y2="55.6"/>
    <line x1="49" y1="51.1" x2="47" y2="56.4"/>
    <line x1="71" y1="51.1" x2="73" y2="56.4"/>
    <line x1="83" y1="50.4" x2="86" y2="55.6"/>
  </g>
</svg>
