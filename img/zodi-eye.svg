<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 84" role="img" aria-label="The Zodi third eye">
  <defs>
    <radialGradient id="ze-cobalt" cx="50%" cy="42%" r="60%">
      <stop offset="0%" stop-color="#2b4bd8"/>
      <stop offset="72%" stop-color="#122a86"/>
      <stop offset="100%" stop-color="#0a1750"/>
    </radialGradient>
    <radialGradient id="ze-iris" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#b79bf0"/>
      <stop offset="55%" stop-color="#7a55c8"/>
      <stop offset="100%" stop-color="#3d2a78"/>
    </radialGradient>
    <linearGradient id="ze-lid" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe2b4"/>
      <stop offset="100%" stop-color="#b99c5e"/>
    </linearGradient>
    <filter id="ze-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="2.2" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- rays of the third eye, brass -->
  <g stroke="url(#ze-lid)" stroke-width="1.6" stroke-linecap="round" opacity=".85">
    <line x1="60" y1="10" x2="60" y2="2"/>
    <line x1="41" y1="14" x2="37" y2="7"/>
    <line x1="79" y1="14" x2="83" y2="7"/>
    <line x1="25" y1="24" x2="18" y2="19"/>
    <line x1="95" y1="24" x2="102" y2="19"/>
  </g>

  <!-- the almond lid -->
  <path d="M8 48 C28 20, 92 20, 112 48 C92 74, 28 74, 8 48 Z"
        fill="oklch(0.16 0.03 275)" stroke="url(#ze-lid)" stroke-width="2.4" filter="url(#ze-glow)"/>

  <!-- nazar rings -->
  <circle cx="60" cy="48" r="22" fill="url(#ze-cobalt)"/>
  <circle cx="60" cy="48" r="15.5" fill="#eef2f7"/>
  <circle cx="60" cy="48" r="11" fill="#57c8d8"/>
  <circle cx="60" cy="48" r="7.4" fill="url(#ze-iris)"/>
  <circle cx="60" cy="48" r="3.4" fill="#0a0c18"/>

  <!-- the brass spark of awakening -->
  <path d="M63.5 42.2 l1 2.3 2.3 1 -2.3 1 -1 2.3 -1-2.3 -2.3-1 2.3-1 Z" fill="#efe2b4" filter="url(#ze-glow)"/>
  <!-- moonlight catch -->
  <ellipse cx="54.5" cy="42.5" rx="3.4" ry="2.1" fill="#ffffff" opacity=".55"/>

  <!-- lower lashes, quiet -->
  <g stroke="url(#ze-lid)" stroke-width="1.3" stroke-linecap="round" opacity=".6">
    <line x1="42" y1="70" x2="39" y2="76"/>
    <line x1="60" y1="73" x2="60" y2="80"/>
    <line x1="78" y1="70" x2="81" y2="76"/>
  </g>
</svg>
