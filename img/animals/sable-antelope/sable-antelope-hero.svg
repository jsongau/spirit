<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A mature black-coated sable antelope bull dropped low on bent forelegs, head lowered and ridged horns swept forward in mid-defense, facing an unseen threat on open savanna at dusk beneath a first-quarter moon">
  <defs>
