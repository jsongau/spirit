      <stop offset="65%" stop-color="#f2e2c4" stop-opacity=".18"/>
      <stop offset="100%" stop-color="#f2e2c4" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sa-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#2c231c"/>
      <stop offset="100%" stop-color="#0c0a08"/>
    </linearGradient>
    <linearGradient id="sa-horn" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d8c193"/>
      <stop offset="100%" stop-color="#a9865a"/>
    </linearGradient>
    <filter id="sa-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
