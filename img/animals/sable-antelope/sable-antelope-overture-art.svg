<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="A sable antelope bull kneeling low in defense in moonlit grass, closer and calmer">
  <defs>
    <linearGradient id="sa-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a2036"/>
      <stop offset="55%" stop-color="#3d2a28"/>
      <stop offset="100%" stop-color="#6b3f2c"/>
    </linearGradient>
    <radialGradient id="sa-horizon" cx="50%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#c98a4a" stop-opacity=".55"/>
      <stop offset="60%" stop-color="#c98a4a" stop-opacity=".14"/>
      <stop offset="100%" stop-color="#c98a4a" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sa-moon" cx="50%" cy="50%" r="50%">
