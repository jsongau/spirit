<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A cutaway chambered nautilus shell as a logarithmic spiral of sealed chambers, one small chamber glowing amber at the centre, soft tentacles reaching from the open living chamber, in dark water beneath a thin new moon">
  <defs>
    <radialGradient id="cn-water" cx="50%" cy="30%" r="100%">
      <stop offset="0%" stop-color="#1b2634"/>
      <stop offset="55%" stop-color="#111a25"/>
      <stop offset="100%" stop-color="#080c14"/>
    </radialGradient>
    <linearGradient id="cn-shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9e2cf"/>
      <stop offset="48%" stop-color="#b9c3cd"/>
      <stop offset="100%" stop-color="#5f7180"/>
    </linearGradient>
    <linearGradient id="cn-hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7cdd4"/>
      <stop offset="100%" stop-color="#6d7580"/>
    </linearGradient>
    <radialGradient id="cn-ember" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f7dca0"/>
      <stop offset="45%" stop-color="#e0a840"/>
      <stop offset="100%" stop-color="#9c5f1e"/>
    </radialGradient>
    <radialGradient id="cn-moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#20304a"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </radialGradient>
    <filter id="cn-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cn-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="800" height="800" rx="24" fill="url(#cn-water)"/>

  <!-- thin new moon, low and dim -->
  <g filter="url(#cn-soft)">
    <circle cx="628" cy="150" r="48" fill="url(#cn-moon)"/>
    <circle cx="628" cy="150" r="48" fill="none" stroke="#5a6b84" stroke-width="1.4" opacity="0.5"/>
  </g>

  <!-- faint pressure currents in the deep -->
  <g stroke="#2a3a4d" stroke-width="2" fill="none" opacity="0.30">
    <path d="M40 250 C180 232 300 268 440 244 C560 224 660 260 780 238"/>
    <path d="M30 640 C170 622 300 656 430 636 C560 616 660 652 782 632"/>
  </g>

