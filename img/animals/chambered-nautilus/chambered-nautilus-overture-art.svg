<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="A chambered nautilus rising alone through dark deep water toward a thin shaft of moonlight, its spiral of sealed chambers lit faintly amber at the centre, tentacles reaching upward">
  <defs>
    <radialGradient id="cn-water" cx="50%" cy="30%" r="100%">
      <stop offset="0%" stop-color="#1b2634"/>
      <stop offset="55%" stop-color="#111a25"/>
      <stop offset="100%" stop-color="#080c14"/>
    </radialGradient>
    <linearGradient id="cn-shell" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e9e2cf"/>
      <stop offset="48%" stop-color="#b9c3cd"/>
      <stop offset="100%" stop-color="#5f7180"/>
    </linearGradient>
    <linearGradient id="cn-hood" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7cdd4"/>
      <stop offset="100%" stop-color="#6d7580"/>
    </linearGradient>
    <radialGradient id="cn-ember" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f7dca0"/>
      <stop offset="45%" stop-color="#e0a840"/>
      <stop offset="100%" stop-color="#9c5f1e"/>
    </radialGradient>
    <radialGradient id="cn-moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#20304a"/>
      <stop offset="100%" stop-color="#0c1220"/>
    </radialGradient>
    <filter id="cn-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="cn-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>
  <rect width="400" height="500" fill="url(#cn-water)"/>

  <!-- a thin column of moonlight from the surface far above -->
  <g opacity="0.12">
    <polygon points="176,0 224,0 300,500 120,500" fill="#8fb0d6"/>
  </g>
  <g opacity="0.06">
    <polygon points="190,0 210,0 250,500 158,500" fill="#cfe0f2"/>
  </g>

  <!-- descent into pressure: faint depth bands -->
