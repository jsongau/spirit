<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A harpy eagle perched high in an emergent rainforest tree at dusk, its dark double crest raised, pale barred chest catching the light of a full moon behind the canopy">
  <defs>
    <radialGradient id="he-sky" cx="60%" cy="28%" r="95%">
      <stop offset="0%" stop-color="#1b2b24"/>
      <stop offset="55%" stop-color="#101c17"/>
      <stop offset="100%" stop-color="#080f0c"/>
    </radialGradient>
    <radialGradient id="he-moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4f1e6"/>
      <stop offset="65%" stop-color="#d9d4c0"/>
      <stop offset="100%" stop-color="#a9a48c"/>
    </radialGradient>
    <linearGradient id="he-mantle" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c666a"/>
      <stop offset="100%" stop-color="#23282a"/>
    </linearGradient>
    <linearGradient id="he-breast" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e4e6e0"/>
      <stop offset="100%" stop-color="#aab0ac"/>
    </linearGradient>
    <linearGradient id="he-crest" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2f2e"/>
      <stop offset="100%" stop-color="#0e1111"/>
    </linearGradient>
    <filter id="he-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" rx="24" fill="url(#he-sky)"/>

  <!-- full moon, high behind the canopy -->
  <g filter="url(#he-glow)">
    <circle cx="588" cy="172" r="86" fill="url(#he-moon)"/>
  </g>

  <!-- distant canopy ridgeline -->
  <path d="M0 540 L60 500 L130 530 L190 470 L260 520 L330 460 L410 525 L480 465 L560 530 L630 480 L710 525 L800 480 L800 800 L0 800 Z" fill="#0e1712" opacity="0.9"/>

  <!-- one tall emergent tree, rising above the rest -->
  <path d="M540 800 L548 470 L560 470 L556 800 Z" fill="#0a120d"/>
  <path d="M470 470 C440 440 440 380 480 350 C500 335 535 335 555 352 C592 382 590 442 558 472 C535 490 495 490 470 470 Z" fill="#0a120d"/>

  <!-- nearer canopy -->
  <path d="M0 620 L100 570 L180 615 L260 555 L350 615 L430 560 L520 620 L610 565 L710 620 L800 570 L800 800 L0 800 Z" fill="#070d0a"/>

  <!-- branch the eagle grips -->
  <path d="M250 660 C330 640 430 636 560 648" stroke="#191f1a" stroke-width="14" fill="none" stroke-linecap="round"/>

  <!-- the eagle, perched three-quarter -->
  <g>
    <!-- folded wing / body mass -->
    <path d="M300 660 C270 590 280 500 340 450 C380 418 440 415 480 445 C540 490 555 580 525 650 C500 705 460 730 410 732 C360 733 325 710 300 660 Z" fill="url(#he-mantle)"/>
    <path d="M330 470 C310 520 308 580 330 630" stroke="#171b1c" stroke-width="6" fill="none" opacity="0.5"/>
    <path d="M360 452 C338 512 335 585 360 640" stroke="#171b1c" stroke-width="6" fill="none" opacity="0.4"/>

    <!-- pale barred chest -->
    <path d="M370 470 C400 455 440 458 460 480 C478 505 476 560 460 610 C444 650 404 660 380 630 C358 600 352 520 370 470 Z" fill="url(#he-breast)"/>
    <path d="M378 500 L452 500 M374 530 L456 530 M374 560 L452 560 M380 590 L446 590" stroke="#7d8580" stroke-width="4" opacity="0.55"/>

    <!-- head -->
    <g>
      <ellipse cx="404" cy="392" rx="62" ry="56" fill="url(#he-mantle)"/>
      <!-- pale grey face/throat -->
      <path d="M370 400 C378 428 428 428 436 400 C428 380 378 380 370 400 Z" fill="#c7cdc7" opacity="0.9"/>
      <!-- double-pointed crest, raised -->
      <path d="M372 352 C366 320 372 296 388 280 C392 304 392 330 392 352 Z" fill="url(#he-crest)"/>
      <path d="M414 352 C420 318 414 292 398 276 C393 302 394 330 394 352 Z" fill="url(#he-crest)"/>
      <!-- hooked black beak -->
      <path d="M394 404 C400 418 400 430 390 438 C384 428 384 412 394 404 Z" fill="#161818"/>
      <!-- eye -->
      <circle cx="382" cy="390" r="7" fill="#151313"/>
      <circle cx="384" cy="387" r="2.2" fill="#e7e2cf"/>
    </g>

    <!-- yellow legs and black talons gripping the branch -->
    <path d="M370 700 C368 674 372 656 384 646" stroke="#b99a3f" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M430 706 C432 678 428 658 416 648" stroke="#b99a3f" stroke-width="10" fill="none" stroke-linecap="round"/>
    <path d="M356 656 q-14 6 -22 18 M372 662 q-8 12 -10 24 M392 664 q0 14 4 26" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
    <path d="M444 660 q14 4 24 16 M428 666 q10 10 14 22 M410 668 q2 14 -2 26" stroke="#1a1a1a" stroke-width="4" fill="none" stroke-linecap="round"/>
  </g>
</svg>
