<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="A golden snub-nosed monkey with an upturned blue-grey face and gold fur, seated close beside a smaller monkey, snow-frosted pines and a pale moon behind them">
  <defs>
    <linearGradient id="gsmo-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1f2f3a"/>
      <stop offset="100%" stop-color="#0c141a"/>
    </linearGradient>
    <radialGradient id="gsmo-moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#faf1da"/>
      <stop offset="100%" stop-color="#e0b364"/>
    </radialGradient>
    <linearGradient id="gsmo-fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e0a63f"/>
      <stop offset="100%" stop-color="#7a4a1c"/>
    </linearGradient>
    <linearGradient id="gsmo-fur-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#d99a3a"/>
      <stop offset="100%" stop-color="#8a5620"/>
    </linearGradient>
    <radialGradient id="gsmo-face" cx="45%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#7d97a3"/>
      <stop offset="100%" stop-color="#3a5460"/>
    </radialGradient>
    <filter id="gsmo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="500" rx="18" fill="url(#gsmo-bg)"/>

  <!-- pale moon -->
  <g filter="url(#gsmo-glow)">
    <circle cx="308" cy="82" r="36" fill="url(#gsmo-moon)"/>
  </g>

  <!-- distant ridge and frosted pines -->
  <path d="M0 190 C70 168 130 190 190 170 C250 150 320 178 400 156 L400 260 L0 260 Z" fill="#111c22" opacity="0.85"/>
  <g opacity="0.5" fill="#0d1a20">
    <path d="M40 200 L52 168 L64 200 Z"/>
    <path d="M330 190 L344 156 L358 190 Z"/>
  </g>
  <g opacity="0.55" fill="#c7d4d9">
    <path d="M48 176 L52 168 L56 176 Z"/>
    <path d="M338 164 L344 156 L350 164 Z"/>
  </g>

  <!-- smaller, groomed monkey -->
  <g>
    <path d="M228 468 C204 436 206 384 236 360 C258 342 288 340 306 360 C326 380 328 418 314 448 C302 470 254 480 228 468 Z" fill="url(#gsmo-fur-2)"/>
    <ellipse cx="266" cy="352" rx="24" ry="22" fill="url(#gsmo-face)"/>
    <path d="M258 356 C260 366 272 366 274 356 C271 349 261 349 258 356 Z" fill="#2e4652" opacity="0.7"/>
    <circle cx="260" cy="348" r="2.4" fill="#12181c"/>
    <circle cx="274" cy="348" r="2.4" fill="#12181c"/>
  </g>

  <!-- primary monkey, seated -->
  <g>
    <path d="M92 486 C58 440 60 366 100 330 C130 302 176 292 216 300 C266 310 296 350 300 402 C304 454 274 486 236 494 Z" fill="url(#gsmo-fur)"/>
    <!-- shoulder ruff -->
    <path d="M108 350 C96 384 100 428 122 460 C134 424 138 380 132 352 Z" fill="#a5651c" opacity="0.6"/>
    <!-- tail sweep -->
    <path d="M240 452 C288 444 328 416 350 372 C354 366 348 360 342 365 C322 400 282 424 240 434 Z" fill="#7a4a1c" opacity="0.8"/>
    <!-- arm reaching toward the smaller monkey -->
    <path d="M204 398 C228 388 254 382 274 386 C280 388 282 396 275 399 C256 401 232 407 212 416 Z" fill="url(#gsmo-fur-2)"/>

    <!-- head -->
    <g>
      <ellipse cx="168" cy="308" rx="48" ry="44" fill="url(#gsmo-fur)"/>
      <circle cx="130" cy="276" r="16" fill="#8a5620"/>
      <circle cx="206" cy="276" r="16" fill="#8a5620"/>
      <circle cx="130" cy="276" r="8" fill="#5a3814"/>
      <circle cx="206" cy="276" r="8" fill="#5a3814"/>
      <!-- bare blue-grey face -->
      <ellipse cx="168" cy="316" rx="30" ry="28" fill="url(#gsmo-face)"/>
      <!-- upturned, flattened nose -->
      <path d="M152 302 C150 288 158 278 168 276 C178 278 186 288 184 302 C180 294 174 290 168 290 C162 290 156 294 152 302 Z" fill="#3a5460"/>
      <ellipse cx="159" cy="304" rx="4.6" ry="6.5" fill="#1c2c34"/>
      <ellipse cx="177" cy="304" rx="4.6" ry="6.5" fill="#1c2c34"/>
      <!-- eyes -->
      <circle cx="150" cy="314" r="4" fill="#12181c"/>
      <circle cx="186" cy="314" r="4" fill="#12181c"/>
      <circle cx="151" cy="313" r="1.1" fill="#e8dfc9"/>
      <circle cx="187" cy="313" r="1.1" fill="#e8dfc9"/>
      <!-- mouth -->
      <path d="M156 332 C161 336 175 336 180 332" stroke="#28343a" stroke-width="1.8" fill="none" stroke-linecap="round"/>
    </g>
  </g>
</svg>
