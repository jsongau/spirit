<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A loggerhead shrike, plain and calm, perched on a bare thorned branch in open daylight scrubland, one small prey item already impaled further down the same branch, a pale first-quarter moon faint overhead">
  <defs>
    <linearGradient id="ls-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2e4c8"/>
      <stop offset="55%" stop-color="#e8d3a6"/>
      <stop offset="100%" stop-color="#d9b877"/>
    </linearGradient>
    <linearGradient id="ls-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9a15a"/>
      <stop offset="100%" stop-color="#a9803f"/>
    </linearGradient>
    <radialGradient id="ls-moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f7f1e0" stop-opacity=".8"/>
      <stop offset="60%" stop-color="#f7f1e0" stop-opacity=".3"/>
      <stop offset="100%" stop-color="#f7f1e0" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ls-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#efe9dc"/>
      <stop offset="100%" stop-color="#a7a091"/>
    </linearGradient>
    <filter id="ls-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" rx="24" fill="url(#ls-sky)"/>
