<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A rock wren perched on a talus slope at dusk, a walkway of small paved stones leading up to a dark crevice in the rock, a waxing crescent moon low over the canyon">
  <defs>
    <radialGradient id="rw-sky" cx="58%" cy="26%" r="95%">
      <stop offset="0%" stop-color="#3a2a1c"/>
      <stop offset="45%" stop-color="#241a12"/>
      <stop offset="100%" stop-color="#120e0a"/>
    </radialGradient>
    <radialGradient id="rw-moon" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f4ead2"/>
      <stop offset="65%" stop-color="#dcc79a"/>
      <stop offset="100%" stop-color="#a9835c"/>
    </radialGradient>
    <linearGradient id="rw-rock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a6248"/>
      <stop offset="55%" stop-color="#4f3c2a"/>
      <stop offset="100%" stop-color="#241a12"/>
    </linearGradient>
    <linearGradient id="rw-rock2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#5c4732"/>
      <stop offset="100%" stop-color="#1c140d"/>
    </linearGradient>
    <linearGradient id="rw-bird" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c7bfae"/>
      <stop offset="60%" stop-color="#a9926f"/>
      <stop offset="100%" stop-color="#75604a"/>
    </linearGradient>
    <radialGradient id="rw-crevice" cx="50%" cy="35%" r="70%">
      <stop offset="0%" stop-color="#2a1e14"/>
      <stop offset="100%" stop-color="#0a0705"/>
    </radialGradient>
    <filter id="rw-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" rx="24" fill="url(#rw-sky)"/>

  <!-- waxing crescent moon, low over the canyon -->
  <g filter="url(#rw-glow)">
    <circle cx="600" cy="164" r="56" fill="url(#rw-moon)"/>
    <circle cx="578" cy="150" r="52" fill="url(#rw-sky)"/>
  </g>

  <!-- distant canyon walls -->
  <path d="M0 430 L60 380 L130 415 L210 350 L290 405 L370 340 L450 400 L540 345 L620 405 L700 355 L800 410 L800 800 L0 800 Z" fill="#2b2015" opacity="0.85"/>
  <path d="M0 500 L80 450 L170 495 L260 435 L350 500 L440 440 L540 505 L640 445 L730 505 L800 460 L800 800 L0 800 Z" fill="#1c150e"/>

  <!-- foreground talus slope -->
  <path d="M0 620 C140 560 220 610 300 585 C380 560 420 630 520 600 C620 570 700 630 800 590 L800 800 L0 800 Z" fill="url(#rw-rock)"/>
  <path d="M0 700 C160 660 260 705 360 670 C460 635 560 700 660 665 C720 645 760 660 800 650 L800 800 L0 800 Z" fill="url(#rw-rock2)"/>

  <!-- scattered talus boulders -->
  <ellipse cx="120" cy="672" rx="46" ry="20" fill="#3a2c1e" opacity="0.8"/>
  <ellipse cx="640" cy="700" rx="60" ry="24" fill="#241a12" opacity="0.85"/>
  <ellipse cx="230" cy="740" rx="70" ry="26" fill="#2e2216" opacity="0.7"/>

  <!-- the crevice, half-hidden in the rock -->
  <path d="M470 640 C462 600 490 566 528 566 C566 566 592 602 584 642 C572 686 486 686 470 640 Z" fill="url(#rw-crevice)"/>

  <!-- the paved walkway, small stones leading to the crevice -->
  <g fill="#8c7455" opacity="0.9">
    <ellipse cx="330" cy="720" rx="17" ry="8"/>
    <ellipse cx="368" cy="706" rx="15" ry="7"/>
    <ellipse cx="404" cy="694" rx="16" ry="7.5"/>
    <ellipse cx="440" cy="680" rx="14" ry="6.5"/>
    <ellipse cx="474" cy="666" rx="15" ry="7"/>
    <ellipse cx="506" cy="652" rx="13" ry="6"/>
  </g>
  <g fill="#b89568" opacity="0.55">
    <ellipse cx="330" cy="718" rx="9" ry="3.5"/>
    <ellipse cx="404" cy="692" rx="8" ry="3"/>
    <ellipse cx="474" cy="664" rx="8" ry="3"/>
  </g>

  <!-- the rock wren, perched near the walkway, tail cocked -->
  <g filter="url(#rw-glow)">
    <!-- body -->
    <path d="M300 600 C284 566 296 528 332 512 C368 496 404 512 414 546 C422 574 406 604 372 616 C342 626 312 622 300 600 Z" fill="url(#rw-bird)"/>
    <!-- speckling -->
    <g fill="#5c4a35" opacity="0.55">
      <circle cx="320" cy="552" r="3"/>
      <circle cx="336" cy="538" r="2.6"/>
      <circle cx="352" cy="564" r="2.8"/>
      <circle cx="368" cy="546" r="2.4"/>
      <circle cx="356" cy="588" r="2.6"/>
      <circle cx="332" cy="580" r="2.2"/>
      <circle cx="384" cy="570" r="2.4"/>
    </g>
    <!-- cocked tail -->
    <path d="M300 600 C276 594 254 578 246 552 C270 556 292 572 306 596 Z" fill="#4f3c2a"/>
    <path d="M292 590 C272 582 256 566 250 546" stroke="#241a12" stroke-width="2" fill="none" opacity="0.6"/>
    <!-- wing -->
    <path d="M320 560 C336 552 358 552 372 566 C356 578 332 580 320 560 Z" fill="#4f3c2a" opacity="0.7"/>
    <!-- head -->
    <ellipse cx="404" cy="530" rx="26" ry="24" fill="url(#rw-bird)"/>
    <!-- throat -->
    <path d="M392 542 C398 552 414 552 418 542 C412 534 398 534 392 542 Z" fill="#e6ddc8" opacity="0.8"/>
    <!-- long slightly decurved bill -->
    <path d="M426 526 C444 522 460 524 470 530 C458 534 442 536 426 532 Z" fill="#241a12"/>
    <!-- eye -->
    <circle cx="412" cy="522" r="3.4" fill="#12100c"/>
    <circle cx="413" cy="521" r="1" fill="#e6ddc8"/>
    <!-- legs -->
    <path d="M348 610 L340 632 M368 614 L364 636" stroke="#241a12" stroke-width="3" fill="none" stroke-linecap="round"/>
  </g>

</svg>
