<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="A meerkat standing sentinel on a small sand mound against a dusk desert sky, a thin first quarter moon above the dunes">
  <defs>
    <linearGradient id="mko-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#231a10"/>
      <stop offset="100%" stop-color="#0e0a05"/>
    </linearGradient>
    <radialGradient id="mko-moon-lit" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#f6ecd2"/>
      <stop offset="100%" stop-color="#d3a75c"/>
    </radialGradient>
    <linearGradient id="mko-fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c9975a"/>
      <stop offset="55%" stop-color="#a97a3f"/>
      <stop offset="100%" stop-color="#7c5730"/>
    </linearGradient>
    <radialGradient id="mko-face" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f6ecd8"/>
      <stop offset="100%" stop-color="#dcc59a"/>
    </radialGradient>
    <linearGradient id="mko-mound" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#8a6a3f"/>
      <stop offset="100%" stop-color="#4f3a22"/>
    </linearGradient>
    <filter id="mko-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="500" rx="18" fill="url(#mko-bg)"/>

  <!-- thin first quarter moon -->
  <g filter="url(#mko-glow)">
    <path d="M304 78 a34 34 0 0 1 0 68 Z" fill="url(#mko-moon-lit)"/>
    <path d="M304 78 a34 34 0 0 0 0 68 Z" fill="#100b06"/>
  </g>

  <!-- dune line -->
  <path d="M0 190 C70 172 130 196 190 178 C250 160 320 188 400 168 L400 500 L0 500 Z" fill="#170f09" opacity="0.85"/>
  <path d="M0 240 C80 222 150 248 210 230 C280 210 340 236 400 220 L400 500 L0 500 Z" fill="#0e0a05"/>

  <!-- mound -->
  <path d="M110 468 C100 442 122 416 164 412 C210 408 250 420 260 446 C266 462 258 476 240 480 L128 480 C118 480 114 474 110 468 Z" fill="url(#mko-mound)"/>

  <!-- meerkat, upright, watching -->
  <g>
    <!-- tail bracing down -->
    <path d="M238 462 C264 434 274 378 260 328 C252 356 244 392 232 420 C226 438 228 452 238 462 Z" fill="url(#mko-fur)" opacity="0.92"/>

    <!-- hind legs -->
    <path d="M170 480 C160 448 164 420 182 404 C200 420 204 448 196 480 Z" fill="#8a6238"/>
    <path d="M204 480 C196 450 200 424 216 408 C232 424 236 450 228 480 Z" fill="#8a6238"/>

    <!-- torso -->
    <path d="M172 420 C154 364 162 288 194 254 C214 234 240 234 258 254 C282 288 282 360 264 416 C250 430 186 430 172 420 Z" fill="url(#mko-fur)"/>

    <!-- pale belly band -->
    <path d="M198 390 C193 354 198 312 212 280 C226 312 231 354 226 390 C215 398 205 398 198 390 Z" fill="#e3cfa8" opacity="0.35"/>

    <!-- forepaws tucked at chest -->
    <path d="M186 320 C176 312 173 296 180 284 C189 292 194 308 192 322 Z" fill="#8a6238"/>
    <path d="M248 320 C258 312 261 296 254 284 C245 292 240 308 242 322 Z" fill="#8a6238"/>

    <!-- neck -->
    <path d="M204 254 C201 238 205 226 219 220 C233 226 237 238 234 254 Z" fill="url(#mko-fur)"/>

    <!-- head -->
    <g>
      <ellipse cx="219" cy="196" rx="33" ry="30" fill="url(#mko-face)"/>
      <path d="M198 176 C208 163 231 163 241 176 C237 188 202 188 198 176 Z" fill="#a97a3f" opacity="0.85"/>
      <path d="M195 182 a10 10 0 1 1 3 19 a7 7 0 1 0 -3 -19 Z" fill="#241a10"/>
      <path d="M243 182 a10 10 0 1 0 -3 19 a7 7 0 1 1 3 -19 Z" fill="#241a10"/>
      <ellipse cx="207" cy="197" rx="8" ry="10" fill="#1b130b"/>
      <ellipse cx="231" cy="197" rx="8" ry="10" fill="#1b130b"/>
      <circle cx="208" cy="197" r="2.8" fill="#f0e6cf"/>
      <circle cx="232" cy="197" r="2.8" fill="#f0e6cf"/>
      <path d="M212 210 C215 219 223 219 226 210 C223 204 215 204 212 210 Z" fill="#c9975a" opacity="0.6"/>
      <ellipse cx="219" cy="213" rx="3.6" ry="3" fill="#150f09"/>
    </g>
  </g>
</svg>
