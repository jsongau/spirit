      <stop offset="60%" stop-color="#f7ecd6"/>
      <stop offset="100%" stop-color="#f3a94c" stop-opacity=".5"/>
    </radialGradient>
    <filter id="sb-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
