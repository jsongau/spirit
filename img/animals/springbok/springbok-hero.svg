<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A springbok caught at the peak of a pronk, all four legs off the ground, back arched, its pale dorsal fan raised, alone on open dry-grass veld under a wide, low sun">
