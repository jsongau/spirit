<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="A springbok mid-leap on open veld, closer and calmer, its white dorsal fan lit by low sun">
  <defs>
    <linearGradient id="sb-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a3f2c"/>
      <stop offset="55%" stop-color="#d97a3f"/>
      <stop offset="100%" stop-color="#f6c877"/>
    </linearGradient>
    <radialGradient id="sb-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3d0" stop-opacity=".95"/>
      <stop offset="60%" stop-color="#f3a94c" stop-opacity=".35"/>
      <stop offset="100%" stop-color="#f3a94c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sb-ground" x1="0" y1="0" x2="0" y2="1">
