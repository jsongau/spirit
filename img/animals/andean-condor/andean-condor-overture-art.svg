<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="An Andean condor gliding with wings spread, black plumage banded in white, bare grey-pink head, above a distant Andes ridgeline under a pale sun">
  <defs>
    <linearGradient id="aco-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#34373d"/>
      <stop offset="55%" stop-color="#1c1e22"/>
      <stop offset="100%" stop-color="#0a0908"/>
    </linearGradient>
    <radialGradient id="aco-sun" cx="45%" cy="38%" r="55%">
      <stop offset="0%" stop-color="#f4e6cf"/>
      <stop offset="70%" stop-color="#c98a4a"/>
      <stop offset="100%" stop-color="#7a4520"/>
    </radialGradient>
    <linearGradient id="aco-wing" x1="0.05" y1="0.05" x2="0.95" y2="0.9">
      <stop offset="0%" stop-color="#08090b"/>
      <stop offset="45%" stop-color="#1c1e22"/>
      <stop offset="100%" stop-color="#34373d"/>
    </linearGradient>
    <linearGradient id="aco-body" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#26282d"/>
      <stop offset="100%" stop-color="#0c0d0f"/>
    </linearGradient>
    <linearGradient id="aco-skin" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c98a72"/>
      <stop offset="55%" stop-color="#a8604a"/>
      <stop offset="100%" stop-color="#7a3a1e"/>
    </linearGradient>
    <linearGradient id="aco-collar" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f4efe6"/>
      <stop offset="100%" stop-color="#cdd3d8"/>
    </linearGradient>
    <filter id="aco-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="7" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="500" rx="18" fill="url(#aco-bg)"/>

  <!-- distant sun -->
  <g filter="url(#aco-glow)">
    <circle cx="304" cy="76" r="32" fill="url(#aco-sun)"/>
  </g>

  <!-- ridgeline -->
  <path d="M0 372 C50 350 90 366 130 350 C170 334 200 362 240 348 C280 334 310 364 350 350 C375 341 390 355 400 362 L400 500 L0 500 Z" fill="#100e0d" opacity="0.92"/>

  <!-- condor, wings spread -->
  <g>
    <!-- left wing -->
    <path d="M192 218 C150 212 96 202 50 196 C26 194 12 198 6 208 C22 220 46 230 76 238 C56 242 34 244 16 248 C30 260 60 268 94 268 C76 278 54 282 36 288 C58 296 94 298 124 292 C150 288 172 274 190 254 Z" fill="url(#aco-wing)"/>
    <path d="M166 230 C136 228 100 226 70 228 C86 234 110 240 136 240 C150 238 160 234 166 230 Z" fill="url(#aco-collar)" opacity="0.85"/>

    <!-- right wing -->
    <path d="M208 218 C250 212 304 202 350 196 C374 194 388 198 394 208 C378 220 354 230 324 238 C344 242 366 244 384 248 C370 260 340 268 306 268 C324 278 346 282 364 288 C342 296 306 298 276 292 C250 288 228 274 210 254 Z" fill="url(#aco-wing)"/>
    <path d="M234 230 C264 228 300 226 330 228 C314 234 290 240 264 240 C250 238 240 234 234 230 Z" fill="url(#aco-collar)" opacity="0.85"/>

    <!-- tail -->
    <path d="M191 262 C195 282 197 302 200 318 C203 302 205 282 209 262 Z" fill="#1c1e22"/>

    <!-- body -->
    <path d="M200 196 C189 196 183 212 184 234 C185 252 190 264 200 272 C210 264 215 252 216 234 C217 212 211 196 200 196 Z" fill="url(#aco-body)"/>

    <!-- collar -->
    <ellipse cx="200" cy="200" rx="17" ry="7" fill="url(#aco-collar)"/>

    <!-- neck -->
    <path d="M195 198 C192 186 192 172 195 162 C197 154 203 154 205 162 C208 172 208 186 205 198 Z" fill="url(#aco-skin)"/>

    <!-- head -->
    <ellipse cx="200" cy="154" rx="10" ry="9" fill="url(#aco-skin)"/>
    <path d="M197 146 C196 141 198 137 200 136 C202 137 204 141 203 146 Z" fill="#8a3a24" opacity="0.85"/>
    <circle cx="196" cy="153" r="1.3" fill="#1a0f0a"/>
    <path d="M191 155 C184 156 178 159 175 163 C179 162 184 161 190 160 C192 159 192 156 191 155 Z" fill="#e8dcc4"/>
  </g>
</svg>
