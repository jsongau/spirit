<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Sand Cat portrait">
  <defs>
    <radialGradient id="oc-sky" cx="50%" cy="32%" r="84%">
      <stop offset="0%" stop-color="#1a1c2b"/>
      <stop offset="58%" stop-color="#0d0e18"/>
      <stop offset="100%" stop-color="#090a12"/>
    </radialGradient>
    <radialGradient id="oc-glow" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d6c18c" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#d6c18c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d6c18c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="oc-cat" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20222f"/>
      <stop offset="100%" stop-color="#0e0f18"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#oc-sky)"/>
  <rect x="14" y="14" width="772" height="972" rx="10" fill="none" stroke="#d6c18c" stroke-opacity="0.28" stroke-width="1.5"/>
  <circle cx="400" cy="352" r="330" fill="url(#oc-glow)"/>

  <!-- faint stars + a small arrow of Sagittarius -->
  <g fill="#ece7d8" fill-opacity="0.6">
    <circle cx="150" cy="180" r="1.8"/><circle cx="650" cy="150" r="1.5"/>
    <circle cx="700" cy="380" r="1.4"/><circle cx="110" cy="430" r="1.3"/>
    <circle cx="250" cy="110" r="1.4"/>
  </g>
  <g stroke="#d6c18c" stroke-opacity="0.4" stroke-width="1.2" fill="#ece7d8" fill-opacity="0.7">
    <line x1="560" y1="230" x2="680" y2="170"/><line x1="680" y1="170" x2="646" y2="170"/><line x1="680" y1="170" x2="680" y2="204"/>
    <circle cx="560" cy="230" r="2.4"/><circle cx="680" cy="170" r="3.2"/>
  </g>

  <!-- Sand cat, seated portrait -->
  <g transform="translate(400 470)">
    <!-- ringed tail -->
    <path d="M150 300 Q 300 300 318 168 Q 328 88 286 62 Q 316 120 298 182 Q 276 250 150 250 Z" fill="url(#oc-cat)"/>
    <ellipse cx="304" cy="96" rx="15" ry="14" fill="#0e0f18"/>

    <ellipse cx="0" cy="215" rx="176" ry="196" fill="url(#oc-cat)"/>
    <g fill="#12131d">
      <rect x="-120" y="300" width="82" height="152" rx="40"/>
      <rect x="38" y="300" width="82" height="152" rx="40"/>
    </g>
    <ellipse cx="-79" cy="450" rx="42" ry="16" fill="#0a0b12"/>
    <ellipse cx="79" cy="450" rx="42" ry="16" fill="#0a0b12"/>

    <ellipse cx="0" cy="-30" rx="152" ry="136" fill="url(#oc-cat)"/>

    <!-- broad low ears -->
    <path d="M-38 -146 L-200 -100 L-146 -248 Z" fill="url(#oc-cat)"/>
    <path d="M38 -146 L200 -100 L146 -248 Z" fill="url(#oc-cat)"/>
    <path d="M-64 -142 L-168 -112 L-136 -212 Z" fill="#2b2d3c"/>
    <path d="M64 -142 L168 -112 L136 -212 Z" fill="#2b2d3c"/>

    <!-- pale muzzle -->
    <ellipse cx="0" cy="36" rx="112" ry="82" fill="#c9b17f"/>
    <ellipse cx="-54" cy="48" rx="48" ry="42" fill="#d7c393"/>
    <ellipse cx="54" cy="48" rx="48" ry="42" fill="#d7c393"/>

    <!-- eyes in gold -->
    <ellipse cx="-58" cy="-50" rx="24" ry="18" fill="#d6c18c"/>
    <ellipse cx="58" cy="-50" rx="24" ry="18" fill="#d6c18c"/>
    <ellipse cx="-58" cy="-50" rx="5.5" ry="15" fill="#0c0d15"/>
    <ellipse cx="58" cy="-50" rx="5.5" ry="15" fill="#0c0d15"/>

    <!-- nose + soft mouth -->
    <path d="M-18 8 L18 8 L0 30 Z" fill="#b49b63"/>
    <path d="M0 30 Q -24 56 -54 50" stroke="#7c6a44" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>
    <path d="M0 30 Q 24 56 54 50" stroke="#7c6a44" stroke-width="4" fill="none" stroke-linecap="round" opacity="0.7"/>

    <!-- whiskers -->
    <g stroke="#efe3bd" stroke-width="2" stroke-linecap="round" opacity="0.7">
      <path d="M-66 28 Q -158 18 -226 40" fill="none"/>
      <path d="M66 28 Q 158 18 226 40" fill="none"/>
    </g>
  </g>

</svg>
