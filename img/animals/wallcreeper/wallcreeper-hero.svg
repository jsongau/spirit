      <stop offset="55%" stop-color="#c23b2e" stop-opacity=".4"/>
      <stop offset="100%" stop-color="#c23b2e" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="wc-body" x1="0" y1="0" x2="1" y2="1">
