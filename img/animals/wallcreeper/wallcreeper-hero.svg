<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A small grey Wallcreeper clings to a bare, near-vertical mountain cliff, one wing flicked open to flash crimson and black against an otherwise featureless wall of grey rock, alone beneath a pale, high-altitude sky">
