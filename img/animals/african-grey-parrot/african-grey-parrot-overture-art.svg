<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="An African grey parrot perched close among dark branches, its ash feathers dim in shadow and its scarlet tail catching the only light, a full moon glowing faintly above" >
  <defs>
    <linearGradient id="agpo-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c180f"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <linearGradient id="agpo-feather" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#98907f"/>
      <stop offset="60%" stop-color="#6a6355"/>
      <stop offset="100%" stop-color="#332e25"/>
    </linearGradient>
    <linearGradient id="agpo-tail" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#cf4d38"/>
      <stop offset="60%" stop-color="#8f3123"/>
      <stop offset="100%" stop-color="#4c130e"/>
    </linearGradient>
    <radialGradient id="agpo-face" cx="45%" cy="40%" r="65%">
      <stop offset="0%" stop-color="#eee8da"/>
      <stop offset="100%" stop-color="#c6bcA6"/>
    </radialGradient>
    <filter id="agpo-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="500" rx="18" fill="url(#agpo-bg)"/>

  <!-- faint full moon -->
  <g filter="url(#agpo-glow)">
    <circle cx="322" cy="82" r="32" fill="#d9d2c2" opacity="0.85"/>
  </g>

  <!-- branches -->
  <path d="M0 152 C70 134 130 158 190 140 C244 124 310 148 400 128" stroke="#241f16" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M40 472 C96 436 100 372 156 348" stroke="#241f16" stroke-width="5" fill="none" opacity="0.6"/>

  <!-- the bird, close and compact -->
  <g>
    <!-- tail -->
    <g filter="url(#agpo-glow)">
      <path d="M186 358 C168 410 144 458 116 490 C142 468 168 438 182 402 C186 428 186 458 180 486 C202 452 212 416 208 380 Z" fill="url(#agpo-tail)"/>
    </g>

    <!-- wing -->
    <path d="M226 300 C258 308 278 340 272 378 C268 408 248 428 220 432 C244 404 250 366 240 332 C236 316 230 306 226 300 Z" fill="#2c2820"/>

    <!-- body -->
    <path d="M150 296 C144 258 168 226 208 224 C250 222 280 254 282 296 C284 340 264 380 232 398 C196 416 164 400 154 366 C146 340 148 316 150 296 Z" fill="url(#agpo-feather)"/>
    <path d="M164 302 C180 294 198 292 212 298" stroke="#c7c0af" stroke-width="1.6" fill="none" opacity="0.3" stroke-linecap="round"/>

    <!-- head -->
    <g>
      <ellipse cx="212" cy="262" rx="40" ry="38" fill="url(#agpo-feather)"/>
      <path d="M180 256 C180 240 194 228 210 230 C202 242 198 258 202 274 C188 272 180 266 180 256 Z" fill="url(#agpo-face)"/>
      <circle cx="196" cy="254" r="6" fill="#efe6cc"/>
      <circle cx="196" cy="254" r="2.8" fill="#100d0a"/>
      <path d="M176 264 C166 266 158 272 154 280 C162 282 172 280 178 274 C182 282 182 290 176 296 C190 292 198 280 196 268 C192 264 184 262 176 264 Z" fill="#151109"/>
    </g>
  </g>
</svg>
