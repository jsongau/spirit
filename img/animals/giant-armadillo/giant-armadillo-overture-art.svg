<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="A giant armadillo with a banded, plated shell digs at the mouth of a fresh burrow beneath a starlit, moonless sky, one large curved claw torn into the dark earth beside a broken termite mound">
  <defs>
    <linearGradient id="gao-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1b1610"/>
      <stop offset="100%" stop-color="#0a0805"/>
    </linearGradient>
    <radialGradient id="gao-burrow" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#020202"/>
      <stop offset="100%" stop-color="#0d0906"/>
    </radialGradient>
    <linearGradient id="gao-shell" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#c07a45"/>
      <stop offset="50%" stop-color="#8a4f2b"/>
      <stop offset="100%" stop-color="#4c2c19"/>
    </linearGradient>
    <linearGradient id="gao-shell-2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#a8623a"/>
      <stop offset="100%" stop-color="#5c3520"/>
    </linearGradient>
    <linearGradient id="gao-claw" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#e4dcc9"/>
      <stop offset="100%" stop-color="#a9a49b"/>
    </linearGradient>
    <linearGradient id="gao-mound" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a4526"/>
      <stop offset="100%" stop-color="#3b2314"/>
    </linearGradient>
    <filter id="gao-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="2.4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="500" rx="18" fill="url(#gao-bg)"/>

  <!-- moonless sky: scattered stars -->
  <g fill="#e8dcc4">
    <circle cx="60" cy="48" r="1.1" opacity="0.75"/>
    <circle cx="110" cy="30" r="0.9" opacity="0.55"/>
    <circle cx="170" cy="56" r="1.0" opacity="0.65"/>
    <circle cx="230" cy="34" r="1.3" opacity="0.8"/>
    <circle cx="290" cy="60" r="0.9" opacity="0.5"/>
    <circle cx="340" cy="40" r="1.1" opacity="0.7"/>
    <circle cx="370" cy="70" r="0.9" opacity="0.5"/>
  </g>

  <!-- distant treeline -->
  <path d="M0 150 C50 136 90 150 130 140 C170 130 200 146 240 136 C280 126 320 144 360 134 C380 130 390 132 400 130 L400 190 L0 190 Z" fill="#0d0a06" opacity="0.9"/>

  <!-- rolling dark ground -->
  <path d="M0 196 C60 182 130 198 200 184 C270 170 330 192 400 178 L400 500 L0 500 Z" fill="#16110b"/>

  <!-- broken termite mound, background left -->
  <g>
    <path d="M50 258 C36 250 34 228 50 212 C64 200 84 198 96 208 C112 220 114 244 100 258 C88 270 62 270 50 258 Z" fill="url(#gao-mound)"/>
    <path d="M64 234 C70 224 84 222 92 230 C86 234 74 236 68 244 Z" fill="#241708" opacity="0.8"/>
  </g>

  <!-- torn earth around the burrow mouth -->
  <g fill="#1c130a" opacity="0.85">
    <ellipse cx="238" cy="372" rx="78" ry="18"/>
    <ellipse cx="284" cy="360" rx="36" ry="10"/>
  </g>

  <!-- burrow mouth, foreground right -->
  <ellipse cx="280" cy="392" rx="58" ry="28" fill="url(#gao-burrow)"/>
  <ellipse cx="280" cy="392" rx="58" ry="28" fill="none" stroke="#2c1a0c" stroke-width="4" opacity="0.6"/>

  <!-- banded tail -->
  <path d="M108 396 C86 386 72 364 72 340 C72 336 78 334 80 338 C82 360 94 378 114 388 Z" fill="url(#gao-shell-2)"/>

  <!-- hind leg -->
  <path d="M148 410 C144 400 146 388 156 382 C166 376 176 378 180 386 C182 396 176 408 164 412 C156 416 150 414 148 410 Z" fill="url(#gao-shell-2)"/>

  <!-- domed banded shell -->
  <g>
    <path d="M112 384 C100 350 112 308 146 285 C176 264 220 260 254 274 C288 290 306 324 302 360 C298 394 268 416 230 420 C186 426 130 420 112 384 Z" fill="url(#gao-shell)"/>
    <g stroke="#3a2312" stroke-width="2.4" fill="none" opacity="0.7">
      <path d="M120 348 C154 328 216 326 286 348"/>
      <path d="M114 368 C154 350 224 348 290 370"/>
      <path d="M122 388 C160 374 230 372 284 390"/>
    </g>
    <g fill="#d69a63" opacity="0.5">
      <path d="M144 330 C176 320 236 318 276 332 L276 334 C236 320 176 322 145 332 Z"/>
    </g>
  </g>

  <!-- head lowered toward the ground -->
  <g>
    <path d="M114 350 C94 342 78 326 72 306 C68 296 74 288 84 290 C100 292 112 306 118 322 C122 334 121 344 114 350 Z" fill="url(#gao-shell-2)"/>
    <circle cx="98" cy="300" r="6" fill="#3a2213"/>
    <ellipse cx="76" cy="308" rx="7" ry="5" fill="#2c1a0e"/>
    <path d="M94 314 C96 312 100 312 102 314" stroke="#100a06" stroke-width="1.8" fill="none" stroke-linecap="round"/>
  </g>

  <!-- foreleg driving down into the earth -->
  <path d="M122 360 C114 376 110 392 114 408 C118 414 126 416 130 410 C134 394 136 376 130 358 Z" fill="url(#gao-shell-2)"/>

  <!-- enormous curved claw torn into the ground -->
  <g filter="url(#gao-glow)">
    <path d="M114 404 C104 410 94 420 88 434 C86 440 92 446 98 442 C108 434 116 422 122 410 Z" fill="url(#gao-claw)"/>
    <path d="M88 434 C78 442 68 454 62 468" stroke="url(#gao-claw)" stroke-width="9" fill="none" stroke-linecap="round"/>
  </g>
</svg>
