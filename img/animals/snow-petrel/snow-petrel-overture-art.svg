<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="A pure white snow petrel in flight over bare Antarctic rock, closer and smaller against the empty interior">
  <defs>
    <linearGradient id="sp-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#212a32"/>
      <stop offset="55%" stop-color="#3a4750"/>
      <stop offset="100%" stop-color="#dfe6e2" stop-opacity=".55"/>
    </linearGradient>
    <radialGradient id="sp-horizon" cx="50%" cy="100%" r="75%">
