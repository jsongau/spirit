    <path d="M115.5 644.0 L147.0 583.1 L178.5 608.3 L205.8 557.9 L233.1 604.1 L264.6 576.8 L296.1 616.7 L306.6 648.2 Z" fill="#161310"/>
    <path d="M474.5 654.0 L503.0 598.9 L531.5 621.7 L556.2 576.1 L580.9 617.9 L609.4 593.2 L637.9 629.3 L647.4 657.8 Z" fill="#161310"/>
    <path d="M643.5 630.0 L669.0 580.7 L694.5 601.1 L716.6 560.3 L738.7 597.7 L764.2 575.6 L789.7 607.9 L798.2 633.4 Z" fill="#161310"/></g>
  <path d="M0 592 C176.0 576 360.0 606 528.0 584 C656.0 574 736.0 598 800 588 L800 800 L0 800 Z"
