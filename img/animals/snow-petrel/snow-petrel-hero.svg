<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A pure white snow petrel gliding low over bare dark rock and ice deep in the Antarctic interior, no water in sight, heading toward one small shadowed crevice in a distant rock outcrop">
  <defs>
    <linearGradient id="sp-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#212a32"/>
      <stop offset="55%" stop-color="#3a4750"/>
      <stop offset="100%" stop-color="#dfe6e2" stop-opacity=".55"/>
    </linearGradient>
    <radialGradient id="sp-horizon" cx="50%" cy="100%" r="75%">
      <stop offset="0%" stop-color="#f2f5f0" stop-opacity=".65"/>
      <stop offset="55%" stop-color="#dfe6e2" stop-opacity=".28"/>
      <stop offset="100%" stop-color="#dfe6e2" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sp-rock" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#493f33"/>
      <stop offset="100%" stop-color="#161310"/>
    </linearGradient>
    <radialGradient id="sp-crevice" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#e9d9a8" stop-opacity=".5"/>
      <stop offset="60%" stop-color="#e9d9a8" stop-opacity=".12"/>
      <stop offset="100%" stop-color="#e9d9a8" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="sp-bird" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#f2f5f0"/>
      <stop offset="100%" stop-color="#cdd0c6"/>
    </linearGradient>
    <filter id="sp-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" rx="24" fill="url(#sp-sky)"/>
  <ellipse cx="400.0" cy="622" rx="560.0" ry="176.0" fill="url(#sp-horizon)"/>
