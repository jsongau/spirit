<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 1000" role="img" aria-label="Placeholder: Sun Bear portrait">
  <defs>
    <radialGradient id="ob-sky" cx="52%" cy="34%" r="82%">
      <stop offset="0%" stop-color="#1a1c2b"/>
      <stop offset="58%" stop-color="#0d0e18"/>
      <stop offset="100%" stop-color="#090a12"/>
    </radialGradient>
    <radialGradient id="ob-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#d6c18c" stop-opacity="0.42"/>
      <stop offset="55%" stop-color="#d6c18c" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#d6c18c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ob-bear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#20222f"/>
      <stop offset="100%" stop-color="#0e0f18"/>
    </linearGradient>
  </defs>

  <rect width="800" height="1000" fill="url(#ob-sky)"/>
  <rect x="14" y="14" width="772" height="972" rx="10" fill="none" stroke="#d6c18c" stroke-opacity="0.28" stroke-width="1.5"/>
  <circle cx="400" cy="360" r="330" fill="url(#ob-sun)"/>

  <!-- faint stars -->
  <g fill="#ece7d8" fill-opacity="0.6">
    <circle cx="150" cy="180" r="1.8"/><circle cx="640" cy="150" r="1.5"/>
    <circle cx="700" cy="380" r="1.4"/><circle cx="110" cy="420" r="1.3"/>
    <circle cx="560" cy="90" r="1.2"/><circle cx="240" cy="110" r="1.4"/>
  </g>

  <!-- Sun bear, seated portrait -->
  <g transform="translate(400 470)">
    <ellipse cx="0" cy="215" rx="205" ry="205" fill="url(#ob-bear)"/>
    <g fill="#12131d">
      <rect x="-140" y="300" width="86" height="150" rx="40"/>
      <rect x="54" y="300" width="86" height="150" rx="40"/>
    </g>
    <g stroke="#d6c18c" stroke-width="5" stroke-linecap="round" opacity="0.75">
      <line x1="-122" y1="452" x2="-122" y2="470"/><line x1="-98" y1="452" x2="-98" y2="472"/><line x1="-74" y1="452" x2="-74" y2="470"/>
      <line x1="74" y1="452" x2="74" y2="470"/><line x1="98" y1="452" x2="98" y2="472"/><line x1="122" y1="452" x2="122" y2="470"/>
    </g>
    <circle cx="0" cy="-40" r="160" fill="url(#ob-bear)"/>
    <circle cx="-130" cy="-148" r="50" fill="#20222f"/>
    <circle cx="130" cy="-148" r="50" fill="#20222f"/>
    <circle cx="-130" cy="-148" r="25" fill="#0e0f18"/>
    <circle cx="130" cy="-148" r="25" fill="#0e0f18"/>
    <ellipse cx="0" cy="34" rx="94" ry="74" fill="#c9b17f"/>
    <ellipse cx="0" cy="54" rx="56" ry="36" fill="#b49b63"/>
    <ellipse cx="0" cy="10" rx="28" ry="19" fill="#0c0d15"/>
    <circle cx="-60" cy="-56" r="14" fill="#0c0d15"/>
    <circle cx="60" cy="-56" r="14" fill="#0c0d15"/>
    <circle cx="-55" cy="-61" r="4" fill="#d6c18c"/>
    <circle cx="65" cy="-61" r="4" fill="#d6c18c"/>
    <!-- the sun crescent -->
    <path d="M -92 150 Q 0 280 92 150" fill="none" stroke="#d6c18c" stroke-width="24" stroke-linecap="round"/>
    <path d="M -92 150 Q 0 280 92 150" fill="none" stroke="#efe3bd" stroke-width="7" stroke-linecap="round" opacity="0.55"/>
  </g>

</svg>
