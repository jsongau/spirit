      <stop offset="100%" stop-color="#e7b64f"/>
    </radialGradient>
    <linearGradient id="sb-bark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#54402a"/>
      <stop offset="100%" stop-color="#241a0e"/>
