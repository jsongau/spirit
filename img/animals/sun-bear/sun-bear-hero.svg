    <linearGradient id="sb-fur" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a221c"/>
      <stop offset="100%" stop-color="#0c0906"/>
    </linearGradient>
    <filter id="sb-blur" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sb-blur-soft" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="4" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
