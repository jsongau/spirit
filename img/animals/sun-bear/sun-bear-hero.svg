<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A sun bear braced against a dark tree trunk high in the canopy, claws sunk into a split hollow and its long tongue reaching past them toward a faint glow of honey inside, the pale gold crescent on its chest the only other light in the frame">
  <defs>
