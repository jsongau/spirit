      <stop offset="0%" stop-color="#1f160c"/>
      <stop offset="55%" stop-color="#140d07"/>
      <stop offset="100%" stop-color="#0a0603"/>
    </radialGradient>
    <radialGradient id="sb-honey" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#ffe9a8"/>
      <stop offset="45%" stop-color="#e0a83c" stop-opacity=".85"/>
      <stop offset="100%" stop-color="#e0a83c" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="sb-crest" cx="50%" cy="40%" r="60%">
