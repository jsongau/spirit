<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 1000" role="img" aria-label="Placeholder: Sun Bear hero visual">
  <defs>
    <radialGradient id="sky" cx="66%" cy="32%" r="88%">
      <stop offset="0%" stop-color="#241a10"/>
      <stop offset="55%" stop-color="#17110b"/>
      <stop offset="100%" stop-color="#0c0a08"/>
    </radialGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#e0a83f" stop-opacity="0.6"/>
      <stop offset="55%" stop-color="#e0a83f" stop-opacity="0.14"/>
      <stop offset="100%" stop-color="#e0a83f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="bear" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1d11"/>
      <stop offset="100%" stop-color="#160f09"/>
    </linearGradient>
    <linearGradient id="floor" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2c1c"/>
      <stop offset="100%" stop-color="#211810"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="1000" fill="url(#sky)"/>
  <circle cx="1010" cy="330" r="360" fill="url(#sun)"/>

  <!-- Aries constellation (the ram: a short bent line of stars) -->
  <g stroke="#cdbea6" stroke-opacity="0.5" stroke-width="1.4" fill="#f0e9dc" fill-opacity="0.85">
    <line x1="300" y1="250" x2="430" y2="230"/>
    <line x1="430" y1="230" x2="520" y2="300"/>
    <line x1="520" y1="300" x2="560" y2="410"/>
    <circle cx="300" cy="250" r="4.5"/><circle cx="430" cy="230" r="5.5"/>
    <circle cx="520" cy="300" r="3.6"/><circle cx="560" cy="410" r="3"/>
  </g>
  <g fill="#f0e9dc" fill-opacity="0.7">
    <circle cx="180" cy="440" r="1.6"/><circle cx="720" cy="150" r="1.4"/>
    <circle cx="1300" cy="210" r="1.8"/><circle cx="1400" cy="440" r="1.4"/>
    <circle cx="140" cy="280" r="1.2"/><circle cx="860" cy="250" r="1.3"/>
  </g>

  <!-- forest floor -->
  <path d="M0 800 Q 420 740 840 785 T 1600 775 L1600 1000 L0 1000 Z" fill="url(#floor)"/>
  <path d="M0 860 Q 520 820 1040 865 T 1600 850 L1600 1000 L0 1000 Z" fill="#181109"/>

  <!-- Sun Bear, seated, front-facing -->
  <g transform="translate(1000 470)">
    <!-- haunches / body -->
    <ellipse cx="0" cy="210" rx="215" ry="200" fill="url(#bear)"/>
    <!-- front legs + claws -->
    <g fill="#1a120b">
      <rect x="-150" y="300" width="90" height="150" rx="40"/>
      <rect x="60" y="300" width="90" height="150" rx="40"/>
    </g>
    <g stroke="#c9a05a" stroke-width="5" stroke-linecap="round" opacity="0.8">
      <line x1="-130" y1="452" x2="-130" y2="470"/><line x1="-105" y1="452" x2="-105" y2="472"/><line x1="-80" y1="452" x2="-80" y2="470"/>
      <line x1="80" y1="452" x2="80" y2="470"/><line x1="105" y1="452" x2="105" y2="472"/><line x1="130" y1="452" x2="130" y2="470"/>
    </g>
    <!-- head -->
    <circle cx="0" cy="-40" r="165" fill="url(#bear)"/>
    <!-- ears -->
    <circle cx="-135" cy="-150" r="52" fill="#241a10"/>
    <circle cx="135" cy="-150" r="52" fill="#241a10"/>
    <circle cx="-135" cy="-150" r="26" fill="#160f09"/>
    <circle cx="135" cy="-150" r="26" fill="#160f09"/>
    <!-- muzzle (pale gold, the sun bear's tan face) -->
    <ellipse cx="0" cy="30" rx="98" ry="78" fill="#c9a05a"/>
    <ellipse cx="0" cy="52" rx="60" ry="40" fill="#b98d46"/>
    <!-- nose -->
    <ellipse cx="0" cy="8" rx="30" ry="20" fill="#120c07"/>
    <!-- eyes -->
    <circle cx="-62" cy="-58" r="15" fill="#120c07"/>
    <circle cx="62" cy="-58" r="15" fill="#120c07"/>
    <circle cx="-57" cy="-63" r="4" fill="#e0a83f"/>
    <circle cx="67" cy="-63" r="4" fill="#e0a83f"/>
    <!-- the sun crescent on the chest: the mark that names the sun bear -->
    <path d="M -95 150 Q 0 285 95 150" fill="none" stroke="#e0a83f" stroke-width="26" stroke-linecap="round"/>
    <path d="M -95 150 Q 0 285 95 150" fill="none" stroke="#f0d79a" stroke-width="8" stroke-linecap="round" opacity="0.6"/>
  </g>

  <!-- Ox glyph, embossed faint in foreground -->
  <text x="150" y="640" font-family="Georgia, 'Noto Serif SC', serif" font-size="230" fill="#f0e9dc" fill-opacity="0.06">&#29275;</text>

</svg>
