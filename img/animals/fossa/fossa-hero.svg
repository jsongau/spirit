<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A Fossa descending a rainforest tree trunk head-first at dusk, claws gripping the bark, tail curling up into a darkening canopy, one eye catching a point of orange light">
