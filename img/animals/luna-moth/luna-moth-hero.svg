<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="Atmospheric placeholder study for the Luna Moth, in the The One-Week Devotion palette, standing in for bespoke art not yet commissioned">
  <defs>
    <radialGradient id="g1" cx="62%" cy="20%" r="100%">
      <stop offset="0%" stop-color="#2b2f4a" stop-opacity="0.35"/>
      <stop offset="45%" stop-color="#161a26"/>
      <stop offset="100%" stop-color="#161a26"/>
    </radialGradient>
    <radialGradient id="g2" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#7fb88f"/>
      <stop offset="100%" stop-color="#7fb88f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="shaft" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2b2f4a" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#2b2f4a" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect width="800" height="800" fill="url(#g1)"/>
  <circle cx="466" cy="652" r="60" fill="url(#g2)" opacity="0.05"/>
<circle cx="276" cy="466" r="83" fill="url(#g2)" opacity="0.08"/>
<circle cx="714" cy="326" r="106" fill="url(#g2)" opacity="0.11"/>
<circle cx="368" cy="532" r="129" fill="url(#g2)" opacity="0.14"/>
<circle cx="676" cy="505" r="152" fill="url(#g2)" opacity="0.05"/>
<circle cx="14" cy="322" r="175" fill="url(#g2)" opacity="0.08"/>
<circle cx="181" cy="506" r="198" fill="url(#g2)" opacity="0.11"/>
  <polygon points="540,0 800,0 800,800 620,800" fill="url(#shaft)"/>
  <circle cx="400" cy="400" r="230" fill="none" stroke="#7fb88f" stroke-opacity="0.5" stroke-width="1.5"/>
  <circle cx="400" cy="400" r="170" fill="none" stroke="#2b2f4a" stroke-opacity="0.35" stroke-width="1"/>
  <text x="400" y="410" text-anchor="middle" font-family="Georgia, serif" font-size="30" fill="#2b2f4a" opacity="0.9">Luna Moth</text>
  <text x="400" y="446" text-anchor="middle" font-family="Georgia, serif" font-size="14" letter-spacing="3" fill="#7fb88f" opacity="0.85">THE ONE-WEEK DEVOTION</text>
