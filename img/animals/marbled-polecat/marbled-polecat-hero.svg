<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A marbled polecat arches its back and puffs its blotched black, cream, and orange tail in full threat display at the mouth of a borrowed burrow on a dark steppe, a barely-lit new moon overhead">
  <defs>
    <radialGradient id="mp-sky" cx="54%" cy="24%" r="95%">
      <stop offset="0%" stop-color="#241a12"/>
      <stop offset="55%" stop-color="#170f0a"/>
      <stop offset="100%" stop-color="#0c0806"/>
    </radialGradient>
    <radialGradient id="mp-moon-dark" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#2a2016"/>
      <stop offset="70%" stop-color="#181109"/>
      <stop offset="100%" stop-color="#0c0805"/>
    </radialGradient>
    <linearGradient id="mp-steppe-far" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1c10"/>
      <stop offset="100%" stop-color="#170f09"/>
    </linearGradient>
    <linearGradient id="mp-steppe-near" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1e140b"/>
      <stop offset="100%" stop-color="#0e0a05"/>
    </linearGradient>
    <linearGradient id="mp-mound" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#7a5a34"/>
      <stop offset="100%" stop-color="#402e1a"/>
    </linearGradient>
    <linearGradient id="mp-fur" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3a2b1c"/>
      <stop offset="50%" stop-color="#241a12"/>
      <stop offset="100%" stop-color="#17110b"/>
    </linearGradient>
    <radialGradient id="mp-face" cx="45%" cy="35%" r="65%">
      <stop offset="0%" stop-color="#f4ead2"/>
      <stop offset="100%" stop-color="#d9c396"/>
    </radialGradient>
    <filter id="mp-glow" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="8" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="800" height="800" rx="24" fill="url(#mp-sky)"/>

  <!-- new moon: almost fully dark disc, only a thin rim caught by earthshine -->
  <g filter="url(#mp-glow)">
    <circle cx="606" cy="150" r="46" fill="url(#mp-moon-dark)"/>
    <circle cx="606" cy="150" r="46" fill="none" stroke="#4a3a26" stroke-width="1.4" opacity="0.6"/>
  </g>
  <g opacity="0.5">
    <circle cx="150" cy="120" r="1.6" fill="#e8ddc7"/>
    <circle cx="230" cy="90" r="1.2" fill="#e8ddc7"/>
    <circle cx="480" cy="80" r="1.4" fill="#e8ddc7"/>
    <circle cx="700" cy="230" r="1.3" fill="#e8ddc7"/>
    <circle cx="90" cy="220" r="1.1" fill="#e8ddc7"/>
    <circle cx="340" cy="60" r="1.2" fill="#e8ddc7"/>
  </g>

  <!-- far steppe ridge -->
  <path d="M0 560 L90 530 L170 552 L250 512 L330 548 L410 508 L490 550 L570 514 L650 552 L730 518 L800 548 L800 800 L0 800 Z" fill="url(#mp-steppe-far)" opacity="0.9"/>
  <!-- near steppe ridge -->
  <path d="M0 632 L100 604 L200 634 L300 596 L400 636 L500 600 L600 638 L700 602 L800 634 L800 800 L0 800 Z" fill="url(#mp-steppe-near)"/>

  <!-- a distant scatter of low scrub -->
  <g opacity="0.55" fill="#160f08">
    <ellipse cx="120" cy="700" rx="18" ry="7"/>
    <ellipse cx="640" cy="712" rx="22" ry="8"/>
    <ellipse cx="700" cy="690" rx="14" ry="6"/>
  </g>

  <!-- the borrowed burrow: a raided den mouth, not dug by the animal standing over it -->
  <g>
    <ellipse cx="330" cy="748" rx="86" ry="26" fill="#0c0805"/>
    <path d="M244 748 C240 726 268 706 330 702 C396 698 440 716 448 742 C452 758 440 770 418 774 L262 774 C250 774 246 758 244 748 Z" fill="url(#mp-mound)"/>
    <ellipse cx="330" cy="748" rx="64" ry="18" fill="#08050300"/>
    <ellipse cx="330" cy="748" rx="58" ry="16" fill="#050302"/>
  </g>

  <!-- the marbled polecat, in full threat display: arched spine, puffed tail, flared coat -->
  <g>
    <!-- puffed, raised tail, banded black and pale -->
    <path d="M560 690 C606 630 606 540 566 470 C548 500 534 550 528 604 C524 646 534 676 560 690 Z" fill="url(#mp-fur)"/>
    <g opacity="0.9">
      <ellipse cx="580" cy="620" rx="20" ry="11" fill="#e3b27a" transform="rotate(-58 580 620)"/>
      <ellipse cx="558" cy="560" rx="18" ry="10" fill="#efe2c4" transform="rotate(-58 558 560)"/>
      <ellipse cx="546" cy="500" rx="16" ry="9" fill="#e3b27a" transform="rotate(-58 546 500)"/>
    </g>

    <!-- hind legs braced, standing tall through the arch -->
    <path d="M486 748 C476 706 484 672 508 654 C528 674 534 710 524 748 Z" fill="#1c140d"/>
    <path d="M436 752 C428 712 434 680 454 662 C472 682 478 716 470 752 Z" fill="#1c140d"/>

    <!-- arched spine: the whole body raised into a high, tense curve -->
    <path d="M296 700 C270 636 274 560 320 500 C356 452 420 428 470 440 C520 452 552 494 552 548 C552 592 526 626 486 638 C440 652 396 660 360 686 C338 700 314 704 296 700 Z" fill="url(#mp-fur)"/>

    <!-- marbling: bold cream and orange blotches across the arched back -->
    <g opacity="0.95">
      <path d="M340 640 C334 616 344 592 366 584 C384 592 388 616 378 636 C366 648 348 650 340 640 Z" fill="#e3b27a"/>
      <path d="M400 610 C392 584 404 558 428 550 C448 560 452 588 440 610 C426 624 408 624 400 610 Z" fill="#efe2c4"/>
      <path d="M456 566 C450 542 462 518 486 512 C504 522 506 548 494 568 C480 580 464 578 456 566 Z" fill="#e3b27a"/>
      <path d="M320 592 C312 572 320 552 338 546 C352 554 356 574 348 590 C338 600 326 600 320 592 Z" fill="#efe2c4" opacity="0.85"/>
      <path d="M488 500 C482 480 492 462 510 458 C524 466 526 486 516 502 C506 512 494 510 488 500 Z" fill="#c8703a" opacity="0.8"/>
    </g>

    <!-- foreleg planted, hackles at the shoulder standing full -->
    <path d="M330 700 C316 674 318 646 336 626 C352 646 356 674 348 700 Z" fill="#1c140d"/>
    <path d="M300 690 C286 668 288 644 304 626 C318 644 322 668 314 690 Z" fill="#1c140d"/>

    <!-- neck stretched forward and low, into the hiss -->
    <path d="M282 640 C258 618 244 592 244 566 C264 552 288 556 302 578 C314 598 306 622 282 640 Z" fill="url(#mp-fur)"/>

    <!-- head, mouth open into a hiss, low and forward -->
    <g>
      <ellipse cx="216" cy="558" rx="46" ry="38" fill="url(#mp-face)" transform="rotate(-16 216 558)"/>
      <!-- white forehead band -->
      <path d="M186 528 C202 512 232 512 248 528 C242 544 192 544 186 528 Z" fill="#f4ead2" transform="rotate(-16 216 558)"/>
      <!-- rounded pale ears -->
      <path d="M188 520 a13 13 0 1 1 6 -25 a10 10 0 1 0 -6 25 Z" fill="#efe2c4" transform="rotate(-16 216 558)"/>
      <path d="M256 522 a13 13 0 1 0 -6 -25 a10 10 0 1 1 6 25 Z" fill="#efe2c4" transform="rotate(-16 216 558)"/>
      <!-- black eye mask -->
      <ellipse cx="200" cy="556" rx="12" ry="15" fill="#120c07" transform="rotate(-16 216 558)"/>
      <ellipse cx="236" cy="552" rx="12" ry="15" fill="#120c07" transform="rotate(-16 216 558)"/>
      <circle cx="202" cy="556" r="4" fill="#f0e6cf" transform="rotate(-16 216 558)"/>
      <circle cx="238" cy="552" r="4" fill="#f0e6cf" transform="rotate(-16 216 558)"/>
      <!-- open, hissing muzzle -->
      <path d="M172 586 C180 604 210 610 224 596 C214 580 186 576 172 586 Z" fill="#12100d" transform="rotate(-16 216 558)"/>
      <path d="M180 590 C186 598 202 600 210 592" fill="none" stroke="#f4ead2" stroke-width="2.4" transform="rotate(-16 216 558)"/>
      <ellipse cx="180" cy="572" rx="4.5" ry="3.5" fill="#0c0805" transform="rotate(-16 216 558)"/>
    </g>
  </g>
</svg>
