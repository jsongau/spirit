<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A single Pronghorn at full stride across an open, empty plain at dusk, no other animal in view, running toward nothing visible on the horizon">
  <defs>
    <linearGradient id="ph-sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#1c0f08"/>
      <stop offset="55%" stop-color="#a83226"/>
      <stop offset="100%" stop-color="#e0693f"/>
    </linearGradient>
    <radialGradient id="ph-sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fbe3c0" stop-opacity=".85"/>
      <stop offset="55%" stop-color="#f4c9a0" stop-opacity=".30"/>
      <stop offset="100%" stop-color="#c9552f" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="ph-ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3c2415"/>
      <stop offset="100%" stop-color="#241407"/>
    </linearGradient>
    <linearGradient id="ph-body" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#d9a06a"/>
      <stop offset="100%" stop-color="#7a4f2c"/>
    </linearGradient>
    <filter id="ph-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="800" height="800" rx="24" fill="url(#ph-sky)"/>
