<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A male superb bird-of-paradise mid-display, his black cape fanned into a smooth, near two-dimensional shape with a glowing blue-green breast shield at its center, standing on his cleared forest-floor court while an ordinary, unremarkable perched bird waits in the shadow nearby">
