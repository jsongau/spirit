    <radialGradient id="sb-clearing" cx="50%" cy="50%" r="55%">
      <stop offset="0%" stop-color="#3a2c18"/>
      <stop offset="100%" stop-color="#2a2010"/>
    </radialGradient>
    <linearGradient id="sb-cape" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#232a2f" stop-opacity=".5"/>
      <stop offset="18%" stop-color="#050506"/>
      <stop offset="100%" stop-color="#050506"/>
    </linearGradient>
    <filter id="sb-glow" x="-80%" y="-80%" width="260%" height="260%">
      <feGaussianBlur stdDeviation="10" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <filter id="sb-soft" x="-40%" y="-40%" width="180%" height="180%">
      <feGaussianBlur stdDeviation="3" result="b2"/>
      <feMerge><feMergeNode in="b2"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
