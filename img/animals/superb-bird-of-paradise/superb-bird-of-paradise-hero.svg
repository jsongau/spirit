      <stop offset="0%" stop-color="#141c22"/>
      <stop offset="55%" stop-color="#0a0e12"/>
      <stop offset="100%" stop-color="#05070a"/>
    </radialGradient>
    <radialGradient id="sb-shield" cx="46%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#8ff5e6"/>
      <stop offset="45%" stop-color="#20c9b0"/>
