<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A giant clam fused into a coral reef, its fluted shell half sunk in the coral, mantle fanned wide open beneath a shaft of sunlight falling through clear water, small fish drifting past unconcerned">
