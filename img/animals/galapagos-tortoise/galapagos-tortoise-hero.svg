<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 800" role="img" aria-label="A saddleback Galápagos tortoise on cracked volcanic ground at dawn, neck stretched to full height, reaching toward a single tall cactus pad against a low warm sun">
