<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 500" role="img" aria-label="A moon bear at rest among dark branches, the pale crescent on its chest catching the light, a thin waning moon above">
  <defs>
    <linearGradient id="mbo-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#171d13"/>
      <stop offset="100%" stop-color="#0b0f08"/>
    </linearGradient>
    <radialGradient id="mbo-cres" cx="50%" cy="45%" r="60%">
      <stop offset="0%" stop-color="#f1eede"/>
      <stop offset="100%" stop-color="#b9c3a6"/>
    </radialGradient>
    <filter id="mbo-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="400" height="500" rx="18" fill="url(#mbo-bg)"/>

  <!-- thin waning moon -->
  <g filter="url(#mbo-glow)">
    <circle cx="316" cy="86" r="34" fill="#cdd7c2"/>
    <circle cx="300" cy="76" r="32" fill="#0d110a"/>
  </g>

  <!-- branches -->
  <path d="M0 150 C90 130 150 160 210 140 C260 124 330 150 400 128" stroke="#20261a" stroke-width="6" fill="none" opacity="0.7"/>
  <path d="M60 470 C120 430 120 360 180 340" stroke="#20261a" stroke-width="5" fill="none" opacity="0.6"/>

  <!-- bear, resting compact -->
  <g>
    <path d="M120 480 C90 430 96 340 150 305 C200 275 270 288 296 345 C320 398 305 452 270 480 Z" fill="#1a2015"/>
    <!-- mane -->
    <path d="M132 330 C122 366 128 420 150 458 C160 418 162 366 156 332 Z" fill="#111509" opacity="0.85"/>
    <!-- head -->
    <ellipse cx="196" cy="300" rx="46" ry="42" fill="#1a2015"/>
    <circle cx="166" cy="262" r="18" fill="#20261a"/>
    <circle cx="226" cy="262" r="18" fill="#20261a"/>
    <circle cx="166" cy="262" r="9" fill="#0d110a"/>
    <circle cx="226" cy="262" r="9" fill="#0d110a"/>
    <ellipse cx="196" cy="316" rx="7" ry="5" fill="#cdd7c2"/>
    <circle cx="182" cy="298" r="3.4" fill="#e6ecdd"/>
    <circle cx="210" cy="298" r="3.4" fill="#e6ecdd"/>
    <!-- crescent on chest -->
    <g filter="url(#mbo-glow)">
      <path d="M196 360 a40 40 0 1 0 3 80 a30 32 0 1 1 -3 -80 Z" fill="url(#mbo-cres)"/>
    </g>
  </g>
</svg>
